<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Business Enquiry Chatbot Widget</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f8;
    }

    .business-chatbot {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 9999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .chatbot-bubble {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      padding: 0;
      color: #ffffff;
      background: #6366f1;
      border: 0;
      border-radius: 50%;
      box-shadow: 0 14px 34px rgba(35, 40, 47, 0.28);
      cursor: pointer;
    }

    .chatbot-bubble svg {
      width: 28px;
      height: 28px;
    }

    .chatbot-window {
      display: none;
      grid-template-rows: auto 1fr auto;
      width: 360px;
      height: 520px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      overflow: hidden;
      background: #ffffff;
      border: 1px solid rgba(217, 222, 228, 0.9);
      border-radius: 16px;
      box-shadow: 0 22px 65px rgba(23, 26, 31, 0.24);
    }

    .chatbot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 0 16px 0 18px;
      color: #ffffff;
      background: #23282f;
      font-weight: 800;
    }

    .chatbot-close {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      padding: 0;
      color: rgba(255, 255, 255, 0.82);
      background: transparent;
      border: 0;
      border-radius: 50%;
      font: inherit;
      font-size: 1.45rem;
      line-height: 1;
      cursor: pointer;
    }

    .chatbot-close:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
    }

    .chatbot-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 18px;
      background: #f8fafc;
    }

    .chatbot-message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .chatbot-message-row.is-user {
      justify-content: flex-end;
    }

    .chatbot-avatar {
      flex: 0 0 32px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #6366f1;
    }

    .chatbot-message {
      max-width: 78%;
      padding: 10px 12px;
      color: #171a1f;
      background: #ffffff;
      border: 1px solid #d9dee4;
      border-radius: 14px 14px 14px 4px;
      font-size: 0.92rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .chatbot-message-row.is-user .chatbot-message {
      color: #ffffff;
      background: #6366f1;
      border-color: #6366f1;
      border-radius: 14px 14px 4px 14px;
    }

    .chatbot-typing {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 52px;
      min-height: 38px;
    }

    .chatbot-typing span {
      width: 6px;
      height: 6px;
      background: #626b75;
      border-radius: 50%;
      animation: chatbotTyping 0.95s infinite ease-in-out;
    }

    .chatbot-typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .chatbot-typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    .chatbot-retry-wrap {
      display: none;
      justify-content: flex-start;
      padding-left: 40px;
    }

    .chatbot-retry {
      min-height: 36px;
      padding: 0 14px;
      color: #ffffff;
      background: #a94d2b;
      border: 0;
      border-radius: 4px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .chatbot-inputbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      background: #ffffff;
      border-top: 1px solid #d9dee4;
    }

    .chatbot-inputbar input {
      width: 100%;
      min-width: 0;
      height: 44px;
      border: 1px solid #d9dee4;
      border-radius: 8px;
      padding: 0 12px;
      color: #171a1f;
      background: #f8fafc;
      font: inherit;
    }

    .chatbot-inputbar input:focus {
      border-color: #6366f1;
      outline: 3px solid rgba(99, 102, 241, 0.18);
    }

    .chatbot-inputbar button {
      min-width: 70px;
      height: 44px;
      padding: 0 14px;
      color: #ffffff;
      background: #6366f1;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .chatbot-inputbar button:disabled,
    .chatbot-inputbar input:disabled,
    .chatbot-retry:disabled {
      cursor: not-allowed;
      opacity: 0.64;
    }

    @keyframes chatbotTyping {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.42;
      }

      40% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .business-chatbot {
        right: 16px;
        bottom: 16px;
      }

      .chatbot-window {
        width: calc(100vw - 32px);
        height: min(520px, calc(100vh - 32px));
      }
    }
  </style>
</head>

<body>
  <div class="business-chatbot" aria-live="polite">
    <button class="chatbot-bubble" type="button" aria-label="Open business enquiry chat">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M5 5.75C5 4.78 5.78 4 6.75 4h10.5C18.22 4 19 4.78 19 5.75v7.5c0 .97-.78 1.75-1.75 1.75H10l-4.1 3.08A.56.56 0 0 1 5 17.64V5.75Z"
          fill="currentColor"></path>
      </svg>
    </button>

    <section class="chatbot-window" aria-label="Business enquiry chat">
      <header class="chatbot-header">
        <span>Business Enquiry 💼</span>
        <button class="chatbot-close" type="button" aria-label="Close chat">×</button>
      </header>

      <div class="chatbot-messages"></div>

      <form class="chatbot-inputbar">
        <input type="text" aria-label="Chat message" placeholder="Type your answer...">
        <button type="submit">Send</button>
      </form>
    </section>
  </div>

  <script>
    (function () {
      const WEBHOOK_URL = "https://workflow.ccbp.in/webhook/business-inquiry";
      const MANAGER_EMAIL = "navaneesh09@gmail.com";
      const BOT_AVATAR_URL = "/assets/chatbot-avatar.svg";

      const widget = document.querySelector(".business-chatbot");
      const bubble = widget.querySelector(".chatbot-bubble");
      const windowEl = widget.querySelector(".chatbot-window");
      const closeButton = widget.querySelector(".chatbot-close");
      const messagesEl = widget.querySelector(".chatbot-messages");
      const form = widget.querySelector(".chatbot-inputbar");
      const input = form.querySelector("input");
      const sendButton = form.querySelector("button");

      let name = "";
      let email = "";
      let query = "";
      let step = "name";
      let isTyping = false;
      let isSubmitting = false;
      let canRetry = false;
      let timers = [];

      function clearTimers() {
        timers.forEach((timer) => clearTimeout(timer));
        timers = [];
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setInputState() {
        const disabled = isTyping || isSubmitting || canRetry || step === "done";
        input.disabled = disabled;
        sendButton.disabled = disabled;
        input.placeholder = canRetry ? "Use Retry to resend" : "Type your answer...";
        input.type = step === "email" ? "email" : "text";
      }

      function addMessage(role, text) {
        const row = document.createElement("div");
        row.className = "chatbot-message-row " + (role === "user" ? "is-user" : "is-bot");

        if (role === "bot") {
          const avatar = document.createElement("img");
          avatar.className = "chatbot-avatar";
          avatar.src = BOT_AVATAR_URL;
          avatar.alt = "";
          avatar.width = 32;
          avatar.height = 32;
          row.appendChild(avatar);
        }

        const bubbleEl = document.createElement("div");
        bubbleEl.className = "chatbot-message";
        bubbleEl.textContent = text;
        row.appendChild(bubbleEl);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        const row = document.createElement("div");
        row.className = "chatbot-message-row is-bot";
        row.dataset.typing = "true";

        const avatar = document.createElement("img");
        avatar.className = "chatbot-avatar";
        avatar.src = BOT_AVATAR_URL;
        avatar.alt = "";
        avatar.width = 32;
        avatar.height = 32;
        row.appendChild(avatar);

        const typing = document.createElement("div");
        typing.className = "chatbot-message chatbot-typing";
        typing.innerHTML = "<span></span><span></span><span></span>";
        row.appendChild(typing);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function hideTyping() {
        const typing = messagesEl.querySelector("[data-typing='true']");
        if (typing) {
          typing.remove();
        }
      }

      function queueBotMessage(text) {
        isTyping = true;
        setInputState();
        showTyping();
        const timer = setTimeout(function () {
          hideTyping();
          addMessage("bot", text);
          isTyping = false;
          setInputState();
        }, 600);
        timers.push(timer);
      }

      function questionForStep(targetStep) {
        if (targetStep === "name") {
          return "Hi! 👋 Welcome. What's your name?";
        }

        if (targetStep === "email") {
          return "Nice to meet you, " + name + "! What's your email address?";
        }

        return "Great! Please describe your enquiry, invoice request, or proposal details.";
      }

      function validateStep(targetStep, value) {
        if (targetStep === "name") {
          return value.length >= 2;
        }

        if (targetStep === "email") {
          const atIndex = value.indexOf("@");
          const dotIndex = value.indexOf(".", atIndex + 1);
          return atIndex > 0 && dotIndex > atIndex + 1 && dotIndex < value.length - 1;
        }

        return value.length >= 10;
      }

      async function submitFields() {
        isSubmitting = true;
        canRetry = false;
        removeRetryButton();
        setInputState();

        try {
          const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              name: name,
              email: email,
              query: query,
              managerEmail: MANAGER_EMAIL
            })
          });

          if (response.status !== 200) {
            throw new Error("Submission failed");
          }

          queueBotMessage("✅ Your request has been submitted successfully! We'll get back to you at " + email + " shortly.");
        } catch (error) {
          queueBotMessage("❌ Something went wrong. Please try again.");
          canRetry = true;
          const timer = setTimeout(showRetryButton, 650);
          timers.push(timer);
        } finally {
          isSubmitting = false;
          setInputState();
        }
      }

      function showRetryButton() {
        removeRetryButton();
        const wrap = document.createElement("div");
        wrap.className = "chatbot-retry-wrap";
        wrap.style.display = "flex";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "chatbot-retry";
        button.textContent = "Retry";
        button.addEventListener("click", submitFields);
        wrap.appendChild(button);
        messagesEl.appendChild(wrap);
        scrollToBottom();
      }

      function removeRetryButton() {
        const retry = messagesEl.querySelector(".chatbot-retry-wrap");
        if (retry) {
          retry.remove();
        }
      }

      function resetConversation() {
        clearTimers();
        messagesEl.innerHTML = "";
        name = "";
        email = "";
        query = "";
        step = "name";
        isTyping = false;
        isSubmitting = false;
        canRetry = false;
        input.value = "";
        setInputState();
        queueBotMessage(questionForStep("name"));
      }

      bubble.addEventListener("click", function () {
        bubble.style.display = "none";
        windowEl.style.display = "grid";
        resetConversation();
      });

      closeButton.addEventListener("click", function () {
        clearTimers();
        windowEl.style.display = "none";
        bubble.style.display = "grid";
        resetConversation();
        messagesEl.innerHTML = "";
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        const value = input.value.trim();
        if (!value || isTyping || isSubmitting || canRetry) {
          return;
        }

        addMessage("user", value);
        input.value = "";

        if (!validateStep(step, value)) {
          queueBotMessage("That doesn't look right — please try again. " + questionForStep(step));
          return;
        }

        if (step === "name") {
          name = value;
          step = "email";
          queueBotMessage(questionForStep("email"));
          setInputState();
          return;
        }

        if (step === "email") {
          email = value;
          step = "query";
          queueBotMessage(questionForStep("query"));
          setInputState();
          return;
        }

        query = value;
        step = "done";
        queueBotMessage("Thanks " + name + "! Submitting your request now... ⏳");
        const timer = setTimeout(submitFields, 700);
        timers.push(timer);
        setInputState();
      });
    })();
  </script>
</body>

</html>
